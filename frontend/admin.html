<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackMonk - Admin</title>
  <meta name="theme-color" content="#e94560">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/admin-styles.css">
</head>
<body>
  <!-- Login -->
  <div id="login-page" class="login-page">
    <div class="login-card">
      <div class="login-logo">🐵</div>
      <h1>TrackMonk</h1>
      <p>Panel de Administración</p>
      <div id="status-login" class="status"></div>
      <input type="text" id="admin-username" placeholder="Usuario" value="admin">
      <input type="password" id="admin-password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')adminLogin()">
      <button onclick="adminLogin()" class="btn-login">Entrar</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none;">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">🐵</span>
        <span class="logo-text">TrackMonk</span>
      </div>
      <div class="nav-items">
        <button class="nav-item active" onclick="navigate('devices')">
          <span class="nav-icon">📱</span><span class="nav-label">Dispositivos</span>
        </button>
        <button class="nav-item" onclick="navigate('map')">
          <span class="nav-icon">🗺️</span><span class="nav-label">Mapa</span>
        </button>
        <button class="nav-item" onclick="navigate('trips')">
          <span class="nav-icon">🚛</span><span class="nav-label">Viajes</span>
        </button>
        <button class="nav-item" onclick="navigate('alerts')">
          <span class="nav-icon">🚨</span><span class="nav-label">Alertas <span id="alert-count-badge" style="display:none;background:#ef4444;color:#fff;font-size:0.65rem;padding:0.1rem 0.35rem;border-radius:10px;margin-left:0.2rem;"></span></span>
        </button>
        <button class="nav-item" onclick="navigate('search')">
          <span class="nav-icon">🔍</span><span class="nav-label">Buscar</span>
        </button>
        <button class="nav-item nav-super" style="display:none;" onclick="navigate('companies')">
          <span class="nav-icon">🏢</span><span class="nav-label">Empresas</span>
        </button>
        <button class="nav-item nav-super" style="display:none;" onclick="navigate('users')">
          <span class="nav-icon">👥</span><span class="nav-label">Usuarios</span>
        </button>
        <button class="nav-item nav-super" style="display:none;" onclick="navigate('settings')">
          <span class="nav-icon">⚙️</span><span class="nav-label">Configuración</span>
        </button>
      </div>
      <div class="sidebar-footer">
        <button onclick="adminLogout()" class="nav-item nav-logout">
          <span class="nav-icon">🚪</span><span class="nav-label">Salir</span>
        </button>
      </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">
      <header class="top-bar">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h2 id="page-title">Dispositivos</h2>
        <div id="alert-alarm" onclick="navigate.call(document.querySelectorAll('.nav-item')[3],'alerts')" style="display:none;cursor:pointer;background:#ef4444;color:#fff;padding:0.4rem 0.8rem;border-radius:8px;font-size:0.8rem;font-weight:600;animation:pulse 1.5s infinite;">
          🚨 <span id="alert-alarm-count"></span> alertas activas
        </div>
        <div id="status" class="status status-info"></div>
      </header>
      <style>
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
      </style>

      <!-- Page: Dispositivos -->
      <section id="page-devices" class="page active">
        <div class="toolbar">
          <button onclick="trackAll()" class="btn btn-danger">📍 Trackear todos</button>
          <button onclick="loadDevices()" class="btn btn-secondary">🔄 Refrescar</button>
          <button onclick="exportDevices()" class="btn btn-secondary">📥 Exportar CSV</button>
        </div>
        <div id="devices-list" class="grid"></div>
      </section>

      <!-- Page: Mapa -->
      <section id="page-map" class="page">
        <div class="toolbar">
          <select id="map-device-filter" onchange="filterMapByDevice()" style="padding:0.5rem;border:1px solid #e0e0e0;border-radius:8px;font-size:0.85rem;">
            <option value="all">Todos los dispositivos</option>
          </select>
          <input type="date" id="map-date-from" style="padding:0.5rem;border:1px solid #e0e0e0;border-radius:8px;font-size:0.85rem;">
          <input type="date" id="map-date-to" style="padding:0.5rem;border:1px solid #e0e0e0;border-radius:8px;font-size:0.85rem;">
          <button onclick="filterMapByDevice()" class="btn btn-primary btn-sm">Filtrar</button>
          <button onclick="loadAllOnMap()" class="btn btn-secondary btn-sm">🔄 Todos</button>
        </div>
        <div id="map" style="height:500px;width:100%;border-radius:12px;border:1px solid #e0e0e0;"></div>
      </section>

      <!-- Page: Viajes -->
      <section id="page-trips" class="page">
        <div class="toolbar">
          <button onclick="showNewTripForm()" class="btn btn-primary">➕ Nuevo viaje</button>
          <select id="trip-filter" onchange="loadTrips()" class="select-filter">
            <option value="">Todos</option>
            <option value="active">Activos</option>
            <option value="completed">Completados</option>
            <option value="cancelled">Cancelados</option>
          </select>
          <button onclick="loadTrips()" class="btn btn-secondary">🔄</button>
        </div>
        <div id="trips-list"></div>
      </section>

      <!-- Page: Alertas -->
      <section id="page-alerts" class="page">
        <div class="toolbar">
          <select id="alert-filter" onchange="loadAlerts()" class="select-filter">
            <option value="">Todas</option>
            <option value="active" selected>Activas</option>
            <option value="attending">Atendiendo</option>
            <option value="resolved">Resueltas</option>
          </select>
          <button onclick="loadAlerts()" class="btn btn-secondary">🔄</button>
          <button onclick="exportAlerts()" class="btn btn-secondary">📥 Exportar CSV</button>
        </div>
        <div id="alerts-list"></div>
      </section>

      <!-- Page: Buscar -->
      <section id="page-search" class="page">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Buscar por nombre, teléfono, empresa o vehículo..." oninput="searchDevices()">
        </div>
        <div id="search-results"></div>
      </section>

      <!-- Page: Empresas (super admin) -->
      <section id="page-companies" class="page">
        <div class="toolbar">
          <button onclick="showNewCompanyForm()" class="btn btn-primary">➕ Nueva empresa</button>
          <button onclick="loadCompanies()" class="btn btn-secondary">🔄</button>
        </div>
        <div id="companies-list" class="grid"></div>
      </section>

      <!-- Page: Usuarios (super admin) -->
      <section id="page-users" class="page">
        <div class="toolbar">
          <button onclick="showNewUserForm()" class="btn btn-primary">➕ Nuevo usuario</button>
          <button onclick="loadUsers()" class="btn btn-secondary">🔄</button>
        </div>
        <div id="users-list" class="grid"></div>
      </section>

      <!-- Page: Configuración (super admin) -->
      <section id="page-settings" class="page">
        <div class="card">
          <h3>⚙️ Auto-Track</h3>
          <p style="color:#666;font-size:0.85rem;margin-bottom:1rem;">Envía automáticamente solicitudes de ubicación a todos los dispositivos.</p>
          <div class="form-group">
            <label>Estado</label>
            <select id="cfg-enabled" onchange="saveSettings()" style="padding:0.6rem;border:1px solid #e0e0e0;border-radius:8px;font-size:0.9rem;width:100%;">
              <option value="true">✅ Activado</option>
              <option value="false">❌ Desactivado</option>
            </select>
          </div>
          <div class="form-group">
            <label>Intervalo (minutos)</label>
            <select id="cfg-interval" onchange="saveSettings()" style="padding:0.6rem;border:1px solid #e0e0e0;border-radius:8px;font-size:0.9rem;width:100%;">
              <option value="5">Cada 5 minutos</option>
              <option value="10">Cada 10 minutos</option>
              <option value="15">Cada 15 minutos</option>
              <option value="30">Cada 30 minutos</option>
              <option value="60">Cada 1 hora</option>
              <option value="120">Cada 2 horas</option>
            </select>
          </div>
          <div id="cfg-status" style="margin-top:0.5rem;font-size:0.85rem;color:#666;"></div>
          <button onclick="testAutoTrack()" class="btn btn-primary" style="margin-top:1rem;">🧪 Probar ahora</button>
        </div>
      </section>

      <!-- Detail panel (modal) -->
      <div id="detail-overlay" class="overlay" style="display:none;" onclick="closeDetail(event)">
        <div id="detail-panel" class="detail-panel"></div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/config.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
